name: Scrape and update leaderboards

on:
  schedule:
    - cron: '30 14 * * *'  # 8:30 AM CST daily
  workflow_dispatch:

jobs:
  scrape-hit-and-pitch:
    name: Scrape Hitters and Pitchers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MLB stats pipeline
        run: |
          mkdir -p data/hitters
          mkdir -p data/pitchers
          python mlb_stats_pipeline.py

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: leaderboard-csv
          path: |
            data/hitters/leaderboard_data.csv
            data/pitchers/leaderboard_pitch_data.csv

      - name: Commit and push leaderboard data
        env:
          GH_TOKEN: ${{ secrets.MILB_LEADERBOARD }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A data/hitters data/pitchers
          test ! -f data/mlb_stats_api_errors.csv || git add data/mlb_stats_api_errors.csv
          git diff --cached --quiet || git commit -m "Update leaderboard data"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase --autostash origin main
          git push origin HEAD:main


